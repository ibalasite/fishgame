# Generated by gendoc-gen-contracts from docs/EDD.md §10.3 Deployment Diagram
# Project: fishing-arcade-game
# Source: docs/EDD.md + docs/ARCH.md
# Deploy Target: docker-compose (local dev / staging)

version: '3.8'

services:
  # ── API Service（Account + Shop）────────────────────────────
  api:
    image: "fishing-arcade-game/api:latest"
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_URL=mysql://fishgame:fishgame_dev_pass@mysql:3306/fishgame
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - api-network
      - data-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Game Service（Colyseus Room Server）──────────────────────
  game:
    image: "fishing-arcade-game/game:latest"
    build:
      context: .
      dockerfile: Dockerfile
      target: game
    ports:
      - "2567:2567"
    environment:
      - NODE_ENV=development
      - PORT=2567
      - DB_URL=mysql://fishgame:fishgame_dev_pass@mysql:3306/fishgame
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - RTP_TARGET_MIN=0.85
      - RTP_TARGET_MAX=0.95
      - JACKPOT_TRIGGER_PROBABILITY=0.0001
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - game-network
      - data-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2567/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Admin Service ──────────────────────────────────────────
  admin:
    image: "fishing-arcade-game/admin:latest"
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_URL=mysql://fishgame:fishgame_dev_pass@mysql:3306/fishgame
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - api-network
      - data-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── MySQL 8.0 ──────────────────────────────────────────────
  mysql:
    image: "mysql:8.0.36"
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-fishgame_root_pass}
      - MYSQL_DATABASE=fishgame
      - MYSQL_USER=fishgame
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-fishgame_dev_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./prisma/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "fishgame", "-pfishgame_dev_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+00:00'
      --max-connections=500
    restart: unless-stopped

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: "redis:7.2-alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # ── Unleash Feature Flag Server ────────────────────────────
  unleash:
    image: "unleashorg/unleash-server:5"
    ports:
      - "4242:4242"
    environment:
      - DATABASE_URL=postgres://unleash:unleash@unleash-db:5432/unleash
      - UNLEASH_URL=http://localhost:4242
    networks:
      - api-network
      - unleash-network
    depends_on:
      unleash-db:
        condition: service_healthy
    restart: unless-stopped

  unleash-db:
    image: "postgres:15-alpine"
    environment:
      - POSTGRES_DB=unleash
      - POSTGRES_USER=unleash
      - POSTGRES_PASSWORD=unleash
    volumes:
      - unleash_data:/var/lib/postgresql/data
    networks:
      - unleash-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "unleash"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  unleash_data:
    driver: local

networks:
  api-network:
    driver: bridge
    labels:
      zone: "ApiZone"
  game-network:
    driver: bridge
    labels:
      zone: "GameZone"
  data-network:
    driver: bridge
    labels:
      zone: "DataZone"
  unleash-network:
    driver: bridge
    labels:
      zone: "InfraZone"
